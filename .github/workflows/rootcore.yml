name: Root Core - Check Update

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
      - dev

permissions:
  contents: write

jobs:
  check:
    name: Check C and Assembly Files
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install dependencies (cppcheck, nasm)
        run: |
          sudo apt update
          sudo apt install -y cppcheck nasm gcc binutils

      - name: Check C files for syntax errors
        run: |
          FILES=$(find . -name "*.c")
          if [ -z "$FILES" ]; then
            echo "No .c files found, skipping."
          else
            for file in $FILES; do
              gcc -m64 -ffreestanding -mno-red-zone -fsyntax-only "$file" || exit 1
            done
          fi

      - name: Check AT&T Assembly files
        run: |
          FILES=$(find . -name "*.s")
          if [ -z "$FILES" ]; then
            echo "No .s files found."
          else
            for file in $FILES; do
              as --64 -o /dev/null "$file" || exit 1
            done
          fi

      - name: Run static code analysis
        run: |
          if [ -z "$(find . -name "*.c" -o -name "*.h")" ]; then
            echo "No C/H files for cppcheck."
          else
            cppcheck --enable=all --inconclusive --force --quiet --error-exitcode=1 .
          fi
